<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>note — 管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf9f7;
      --text: #2c2c2c;
      --text-light: #6b6b6b;
      --accent: #888888;
      --accent-dark: #555555;
      --border: #dcdcdc;
      --bg-sub: #f2f2f2;
      --danger: #c0392b;
      --success: #27ae60;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-weight: 300;
      line-height: 1.9;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
    }
    header h1 {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: var(--text-light);
    }
    header span {
      font-size: 0.72rem;
      color: var(--text-light);
      opacity: 0.6;
      letter-spacing: 0.1em;
    }

    /* ── Layout ── */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* ── Token setup ── */
    #setup {
      background: var(--bg-sub);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      margin-bottom: 3rem;
    }
    #setup h2 {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      color: var(--text-light);
    }
    #setup p {
      font-size: 0.78rem;
      color: var(--text-light);
      margin-bottom: 1rem;
    }
    .token-row {
      display: flex;
      gap: 0.8rem;
    }
    #setup input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.78rem;
      background: white;
      color: var(--text);
      outline: none;
    }
    #setup input:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    button {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 0.5rem 1.2rem;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    button:hover { background: var(--bg-sub); }
    button.primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    button.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    button.danger { color: var(--danger); border-color: #e8c4c0; }
    button.danger:hover { background: #fdf0ee; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Section ── */
    .section-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }
    .section-subtitle {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-bottom: 1.8rem;
    }
    .divider {
      width: 32px; height: 1px;
      background: var(--accent);
      opacity: 0.4;
      margin: 0.6rem 0 1.8rem;
    }

    /* ── Category list ── */
    #cat-section { margin-bottom: 4rem; }
    #cat-list { list-style: none; margin-bottom: 1.5rem; }
    #cat-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .cat-label { font-size: 0.88rem; }
    .cat-label span { font-size: 0.72rem; color: var(--text-light); margin-left: 0.6rem; }
    .cat-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    /* ── Add category form ── */
    .add-form {
      background: var(--bg-sub);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      margin-top: 1rem;
    }
    .add-form h3 {
      font-size: 0.78rem;
      color: var(--text-light);
      letter-spacing: 0.1em;
      margin-bottom: 1.2rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }
    .form-row.full { grid-template-columns: 1fr; }
    label {
      display: block;
      font-size: 0.7rem;
      color: var(--text-light);
      letter-spacing: 0.08em;
      margin-bottom: 0.3rem;
    }
    input[type=text], textarea {
      width: 100%;
      padding: 0.55rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.82rem;
      font-weight: 300;
      background: white;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type=text]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.7; }
    .form-actions { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1rem; }

    /* ── Page editor ── */
    #page-section { margin-bottom: 4rem; }
    .page-selector {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .page-btn {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      padding: 0.4rem 1rem;
    }
    .page-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* ── Entry list ── */
    #entry-list { list-style: none; margin-bottom: 1.5rem; }
    #entry-list li {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .entry-info { flex: 1; min-width: 0; }
    .entry-title { font-size: 0.9rem; font-family: 'Noto Serif JP', serif; }
    .entry-sub { font-size: 0.72rem; color: var(--text-light); margin-top: 0.1rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-actions { display: flex; gap: 0.5rem; flex-shrink: 0; padding-top: 0.1rem; }

    /* ── Entry add form ── */
    #entry-add-form { display: none; }

    /* ── Edit modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(44,44,44,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      width: 90%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.9rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.5rem; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 0.7rem 1.6rem;
      border-radius: 3px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    #toast.show { opacity: 1; }
    #toast.error { background: var(--danger); }

    /* ── Loading ── */
    .loading { text-align: center; padding: 2rem; color: var(--text-light); font-size: 0.8rem; letter-spacing: 0.1em; }
    .empty { color: var(--text-light); font-size: 0.82rem; padding: 1.5rem 0; }
  </style>
</head>
<body>

<header>
  <h1>note</h1>
  <span>管理画面</span>
</header>

<div class="container">

  <!-- Token Setup -->
  <div id="setup">
    <h2>GitHub 接続設定</h2>
    <p>Personal Access Token（repo権限）を入力してください。このページ内にのみ保存され、外部には送信されません。</p>
    <div class="token-row">
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <button onclick="saveToken()">接続</button>
    </div>
    <p id="token-status" style="margin-top:0.8rem; font-size:0.72rem;"></p>
  </div>

  <!-- Category Section -->
  <div id="cat-section">
    <h2 class="section-title">カテゴリ管理</h2>
    <p class="section-subtitle">Selection ページのカテゴリ一覧を編集する</p>
    <div class="divider"></div>

    <ul id="cat-list">
      <li class="loading">— トークンを設定してください —</li>
    </ul>

    <button onclick="toggleAddCat()">＋ カテゴリを追加</button>

    <div class="add-form" id="add-cat-form" style="display:none; margin-top:1rem;">
      <h3>新規カテゴリ</h3>
      <div class="form-row">
        <div>
          <label>英語名（例: Essay）</label>
          <input type="text" id="new-cat-en" placeholder="Essay">
        </div>
        <div>
          <label>日本語名（例: エッセイ）</label>
          <input type="text" id="new-cat-ja" placeholder="エッセイ">
        </div>
      </div>
      <div class="form-actions">
        <button onclick="toggleAddCat()">キャンセル</button>
        <button class="primary" onclick="addCategory()">追加して保存</button>
      </div>
    </div>
  </div>

  <!-- Page Content Section -->
  <div id="page-section">
    <h2 class="section-title">ページ内容の編集</h2>
    <p class="section-subtitle">各カテゴリページのエントリを追加・削除する</p>
    <div class="divider"></div>

    <div class="page-selector" id="page-selector">
      <span class="empty">カテゴリを読み込み中...</span>
    </div>

    <div id="entry-area" style="display:none;">
      <ul id="entry-list"></ul>

      <button onclick="toggleAddEntry()">＋ エントリを追加</button>

      <div class="add-form" id="entry-add-form">
        <h3>新規エントリ</h3>
        <div class="form-row">
          <div>
            <label>タイトル *</label>
            <input type="text" id="new-title" placeholder="作品名・人物名など">
          </div>
          <div>
            <label>サブタイトル（著者・肩書など）</label>
            <input type="text" id="new-author" placeholder="著者名など">
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>メタ情報（出版年・出身地など）</label>
            <input type="text" id="new-meta" placeholder="2023年 / 日本">
          </div>
          <div>
            <label>画像パス（省略可）</label>
            <input type="text" id="new-img" placeholder="images/filename.jpg">
          </div>
        </div>
        <div class="form-row full">
          <div>
            <label>説明文 *</label>
            <textarea id="new-desc" placeholder="このエントリについての説明文を入力..."></textarea>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>リンクURL（省略可）</label>
            <input type="text" id="new-link-url" placeholder="https://...">
          </div>
          <div>
            <label>リンクテキスト</label>
            <input type="text" id="new-link-text" placeholder="Amazon で見る">
          </div>
        </div>
        <div class="form-actions">
          <button onclick="toggleAddEntry()">キャンセル</button>
          <button class="primary" onclick="addEntry()">追加して保存</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>エントリを編集</h3>
    <div class="form-row">
      <div>
        <label>タイトル</label>
        <input type="text" id="edit-title">
      </div>
      <div>
        <label>サブタイトル</label>
        <input type="text" id="edit-author">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>メタ情報</label>
        <input type="text" id="edit-meta">
      </div>
      <div>
        <label>画像パス</label>
        <input type="text" id="edit-img">
      </div>
    </div>
    <div class="form-row full">
      <div>
        <label>説明文</label>
        <textarea id="edit-desc"></textarea>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>リンクURL</label>
        <input type="text" id="edit-link-url">
      </div>
      <div>
        <label>リンクテキスト</label>
        <input type="text" id="edit-link-text">
      </div>
    </div>
    <div class="modal-actions">
      <button onclick="closeModal()">キャンセル</button>
      <button class="primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const REPO = '0301egg/note';
const BASE = 'https://api.github.com/repos/' + REPO + '/contents/';

let token = '';
let currentPage = null;
let currentPageContent = '';
let currentPageSha = '';
let editingIndex = -1;
let categories = [];

// ── Token ──────────────────────────────────────
function saveToken() {
  token = document.getElementById('token-input').value.trim();
  if (!token) return;
  document.getElementById('token-status').textContent = '接続確認中...';
  apiFetch('selection.html')
    .then(() => {
      document.getElementById('token-status').style.color = 'var(--success)';
      document.getElementById('token-status').textContent = '✓ 接続しました';
      loadCategories();
    })
    .catch(() => {
      document.getElementById('token-status').style.color = 'var(--danger)';
      document.getElementById('token-status').textContent = '✗ 接続失敗。トークンを確認してください。';
    });
}

// ── API ────────────────────────────────────────
function apiFetch(path, options = {}) {
  return fetch(BASE + path, {
    ...options,
    headers: {
      'Authorization': 'token ' + token,
      'Content-Type': 'application/json',
      ...options.headers
    }
  }).then(r => {
    if (!r.ok) throw new Error(r.status);
    return r.json();
  });
}

function apiPut(path, content, sha, message) {
  return apiFetch(path, {
    method: 'PUT',
    body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha })
  });
}

// ── Toast ──────────────────────────────────────
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => el.className = '', 2500);
}

// ── Categories ─────────────────────────────────
async function loadCategories() {
  const data = await apiFetch('selection.html');
  const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
  currentPageSha = data.sha;

  // カード一覧を取得
  const matches = [...content.matchAll(/<a href="(selection-[^"]+\.html)">\s*<span class="card-title">([^<]+)<\/span>\s*<p class="card-desc">([^<]+)<\/p>/g)];
  categories = matches.map(m => ({ file: m[1], en: m[2].trim(), ja: m[3].trim() }));

  renderCatList(content, data.sha);
  renderPageSelector();
}

function renderCatList(content, sha) {
  const ul = document.getElementById('cat-list');
  if (!categories.length) { ul.innerHTML = '<li class="empty">カテゴリなし</li>'; return; }
  ul.innerHTML = categories.map((c, i) => `
    <li>
      <div class="cat-label">${c.en}<span>${c.ja}</span></div>
      <div class="cat-actions">
        <button class="danger" onclick="deleteCategory(${i})">削除</button>
      </div>
    </li>
  `).join('');
}

function renderPageSelector() {
  const sel = document.getElementById('page-selector');
  sel.innerHTML = categories.map(c => `
    <button class="page-btn" onclick="selectPage('${c.file}', this)">${c.en}</button>
  `).join('');
}

function toggleAddCat() {
  const f = document.getElementById('add-cat-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function addCategory() {
  const en = document.getElementById('new-cat-en').value.trim();
  const ja = document.getElementById('new-cat-ja').value.trim();
  if (!en || !ja) return toast('英語名と日本語名を入力してください', true);

  const slug = 'selection-' + en.toLowerCase().replace(/\s+/g, '-') + '.html';

  // selection.html を更新
  const data = await apiFetch('selection.html');
  let html = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
  const newItem = `        <li>\n          <a href="${slug}">\n            <span class="card-title">${en}</span>\n            <p class="card-desc">${ja}</p>\n          </a>\n        </li>`;
  html = html.replace('      </ul>', newItem + '\n      </ul>');
  await apiPut('selection.html', html, data.sha, `Add category: ${en}`);

  // 新しいページファイルを作成
  const newPage = buildNewPage(en, ja, slug);
  try { await apiPut(slug, newPage, '', `Create ${slug}`); }
  catch(e) { /* 既存なら無視 */ }

  document.getElementById('new-cat-en').value = '';
  document.getElementById('new-cat-ja').value = '';
  toggleAddCat();
  await loadCategories();
  toast(`「${en}」を追加しました`);
}

async function deleteCategory(i) {
  const cat = categories[i];
  if (!confirm(`「${cat.en}」を削除しますか？\nページファイル(${cat.file})は残ります。`)) return;

  const data = await apiFetch('selection.html');
  let html = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
  // そのカード要素を丸ごと削除
  const pattern = new RegExp(`\\s*<li>\\s*<a href="${cat.file.replace('.', '\\.')}">.*?</a>\\s*</li>`, 's');
  html = html.replace(pattern, '');
  await apiPut('selection.html', html, data.sha, `Remove category: ${cat.en}`);

  await loadCategories();
  toast(`「${cat.en}」を削除しました`);
}

// ── New page template ──────────────────────────
function buildNewPage(en, ja, slug) {
  return `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${en} — note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <h1><a href="index.html">note</a></h1>
  </header>

  <nav>
    <a href="about.html">About</a>
    <a href="interest.html">Interest</a>
    <a href="philosophy.html">Philosophy</a>
    <a href="archive.html">Archive</a>
    <a href="selection.html">Selection</a>
  </nav>

  <main>
    <div class="page">
      <p class="page-subtitle"><a href="selection.html">&larr; Selection</a></p>
      <h2 class="page-title">${en}</h2>
      <p class="page-subtitle">${ja}</p>
      <div class="divider"></div>

      <div class="section">
        <p>準備中です。</p>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 note</p>
  </footer>

</body>
</html>
`;
}

// ── Page entries ───────────────────────────────
async function selectPage(file, btn) {
  document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = file;
  document.getElementById('entry-area').style.display = 'block';
  document.getElementById('entry-list').innerHTML = '<li class="loading">読み込み中...</li>';

  const data = await apiFetch(file);
  currentPageContent = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
  currentPageSha = data.sha;
  renderEntries();
}

function parseEntries(html) {
  const entries = [];
  const regex = /<div class="book-card">([\s\S]*?)<\/div>\s*<\/div>\s*(?=<div class="book-card">|<\/div>\s*<\/main>)/g;
  let m;
  while ((m = regex.exec(html)) !== null) {
    const block = m[1];
    const title   = (block.match(/<h3 class="book-title">([^<]*)<\/h3>/) || [])[1]?.trim() || '';
    const author  = (block.match(/<p class="book-author">([^<]*)<\/p>/) || [])[1]?.trim() || '';
    const meta    = (block.match(/<p class="book-meta">([\s\S]*?)<\/p>/) || [])[1]?.replace(/<br>/g,'').trim() || '';
    const desc    = (block.match(/<p class="book-desc">([\s\S]*?)<\/p>/) || [])[1]?.trim() || '';
    const img     = (block.match(/<img src="([^"]*)"/) || [])[1] || '';
    const linkUrl = (block.match(/<a class="book-link" href="([^"]*)"/) || [])[1] || '';
    const linkTxt = (block.match(/<a class="book-link"[^>]*>([^<]*)<\/a>/) || [])[1]?.trim() || '';
    if (title) entries.push({ title, author, meta, desc, img, linkUrl, linkTxt });
  }
  return entries;
}

function renderEntries() {
  const entries = parseEntries(currentPageContent);
  const ul = document.getElementById('entry-list');
  if (!entries.length) { ul.innerHTML = '<li class="empty">エントリなし</li>'; return; }
  ul.innerHTML = entries.map((e, i) => `
    <li>
      <div class="entry-info">
        <div class="entry-title">${e.title}</div>
        <div class="entry-sub">${e.author}${e.meta ? ' — ' + e.meta : ''}</div>
      </div>
      <div class="entry-actions">
        <button onclick="openEdit(${i})">編集</button>
        <button class="danger" onclick="deleteEntry(${i})">削除</button>
      </div>
    </li>
  `).join('');
}

function toggleAddEntry() {
  const f = document.getElementById('entry-add-form');
  f.style.display = f.style.display === 'none' || f.style.display === '' ? 'block' : 'none';
}

function buildCardHtml(e) {
  const imgHtml = e.img ? `        <div class="book-cover">\n          <img src="${e.img}" alt="${e.title}">\n        </div>\n` : '';
  const linkHtml = e.linkUrl ? `\n          <a class="book-link" href="${e.linkUrl}" target="_blank" rel="noopener">${e.linkTxt || 'リンク'}</a>` : '';
  return `
      <div class="book-card">
${imgHtml}        <div class="book-info">
          <h3 class="book-title">${e.title}</h3>
          <p class="book-author">${e.author}</p>
          <p class="book-meta">${e.meta}</p>
          <p class="book-desc">
            ${e.desc}
          </p>${linkHtml}
        </div>
      </div>
`;
}

async function addEntry() {
  const e = {
    title:   document.getElementById('new-title').value.trim(),
    author:  document.getElementById('new-author').value.trim(),
    meta:    document.getElementById('new-meta').value.trim(),
    desc:    document.getElementById('new-desc').value.trim(),
    img:     document.getElementById('new-img').value.trim(),
    linkUrl: document.getElementById('new-link-url').value.trim(),
    linkTxt: document.getElementById('new-link-text').value.trim(),
  };
  if (!e.title || !e.desc) return toast('タイトルと説明文は必須です', true);

  // 「準備中です。」セクションを置換 or カードを追加
  let html = currentPageContent;
  const placeholder = /\s*<div class="section">\s*<p>準備中です。<\/p>\s*<\/div>/;
  if (placeholder.test(html)) {
    html = html.replace(placeholder, buildCardHtml(e));
  } else {
    html = html.replace('    </div>\n  </main>', buildCardHtml(e) + '\n    </div>\n  </main>');
  }

  await apiPut(currentPage, html, currentPageSha, `Add entry: ${e.title}`);
  currentPageContent = html;
  const data = await apiFetch(currentPage);
  currentPageSha = data.sha;

  // フォームリセット
  ['new-title','new-author','new-meta','new-desc','new-img','new-link-url','new-link-text'].forEach(id => {
    document.getElementById(id).value = '';
  });
  toggleAddEntry();
  renderEntries();
  toast(`「${e.title}」を追加しました`);
}

async function deleteEntry(i) {
  const entries = parseEntries(currentPageContent);
  const e = entries[i];
  if (!confirm(`「${e.title}」を削除しますか？`)) return;

  // 該当カードを削除
  let html = currentPageContent;
  const escapedTitle = e.title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const pattern = new RegExp(`\\s*<div class="book-card">[\\s\\S]*?<h3 class="book-title">${escapedTitle}<\\/h3>[\\s\\S]*?<\\/div>\\s*<\\/div>`, '');
  html = html.replace(pattern, '');

  await apiPut(currentPage, html, currentPageSha, `Remove entry: ${e.title}`);
  currentPageContent = html;
  const data = await apiFetch(currentPage);
  currentPageSha = data.sha;
  renderEntries();
  toast(`「${e.title}」を削除しました`);
}

// ── Edit modal ─────────────────────────────────
function openEdit(i) {
  const entries = parseEntries(currentPageContent);
  const e = entries[i];
  editingIndex = i;
  document.getElementById('edit-title').value   = e.title;
  document.getElementById('edit-author').value  = e.author;
  document.getElementById('edit-meta').value    = e.meta;
  document.getElementById('edit-desc').value    = e.desc;
  document.getElementById('edit-img').value     = e.img;
  document.getElementById('edit-link-url').value  = e.linkUrl;
  document.getElementById('edit-link-text').value = e.linkTxt;
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingIndex = -1;
}

async function saveEdit() {
  const entries = parseEntries(currentPageContent);
  const old = entries[editingIndex];
  const updated = {
    title:   document.getElementById('edit-title').value.trim(),
    author:  document.getElementById('edit-author').value.trim(),
    meta:    document.getElementById('edit-meta').value.trim(),
    desc:    document.getElementById('edit-desc').value.trim(),
    img:     document.getElementById('edit-img').value.trim(),
    linkUrl: document.getElementById('edit-link-url').value.trim(),
    linkTxt: document.getElementById('edit-link-text').value.trim(),
  };

  const escapedTitle = old.title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const pattern = new RegExp(`\\s*<div class="book-card">[\\s\\S]*?<h3 class="book-title">${escapedTitle}<\\/h3>[\\s\\S]*?<\\/div>\\s*<\\/div>`, '');
  let html = currentPageContent.replace(pattern, buildCardHtml(updated));

  await apiPut(currentPage, html, currentPageSha, `Edit entry: ${updated.title}`);
  currentPageContent = html;
  const data = await apiFetch(currentPage);
  currentPageSha = data.sha;

  closeModal();
  renderEntries();
  toast(`「${updated.title}」を更新しました`);
}

// モーダル外クリックで閉じる
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
